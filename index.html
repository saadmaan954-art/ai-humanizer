<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Humanizer | Elite Tier</title>
    <style>
        body {
            background-color: #000;
            color: #00ffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            border: 2px solid #00ffff;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 20px #00ffff;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        textarea {
            width: 100%;
            height: 150px;
            background: #111;
            border: 1px solid #00ffff;
            border-radius: 10px;
            color: #ccc;
            padding: 10px;
            font-size: 14px;
            resize: none;
            box-sizing: border-box;
        }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 15px;
            background-color: #00ffff;
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background-color: #00cccc;
            box-shadow: 0 0 15px #00ffff;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Humanizer</h1>
    <textarea id="inputText" placeholder="Paste AI text..."></textarea>
    <button onclick="humanizeText()">Humanize</button>
</div>

<script>
    function humanizeText() {
        let text = document.getElementById('inputText').value;
        if(text.trim() === "") {
            alert("Please paste some text first!");
            return;
        }

        // Simple Humanizing Logic: Replacing formal words with natural ones
        let humanized = text
            .replace(/Artificial Intelligence/g, "Smart technology")
            .replace(/significantly transformed/g, "really changed")
            .replace(/essential to understand/g, "important to know")
            .replace(/vast amounts of data/g, "lots of info")
            .replace(/nuance of human emotion/g, "real human feelings")
            .replace(/integration/g, "mixing")
            .replace(/necessary step/g, "must-do thing");

        document.getElementById('inputText').value = humanized;
        alert("Text Humanized Successfully!");
    }
</script>

</body>
</html>
