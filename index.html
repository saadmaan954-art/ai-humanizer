<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Elite Tool</title>
<style>
 body{background:#050505;color:#0ff;font-family:sans-serif;text-align:center;padding:10px}
 .box{border:1px solid #0ff;border-radius:10px;padding:15px;max-width:350px;margin:10px auto;background:rgba(0,255,255,0.02)}
 textarea{width:100%;height:70px;background:#000;border:1px solid #333;color:#0f6;padding:5px;box-sizing:border-box}
 button{width:100%;padding:10px;margin-top:5px;background:none;border:1px solid #0ff;color:#0ff;font-weight:bold}
 img{width:100%;margin-top:10px;display:none;border:1px solid #0f6}
</style>
</head>
<body>
<div class="box">
 <h3>AI HUMANIZER</h3>
 <textarea id="txt" placeholder="Paste AI text..."></textarea>
 <button onclick="hmn()">HUMANIZE</button>
 <button onclick="cpy()" style="border-color:#0f6;color:#0f6">COPY</button>
</div>
<div class="box">
 <h3>IMAGE GEN</h3>
 <textarea id="pr" placeholder="Describe image..."></textarea>
 <button onclick="gen()">GENERATE</button>
 <div id="st" style="font-size:11px;color:#555"></div>
 <img id="res" src="">
</div>
<script>
 function hmn(){
  let a=document.getElementById('txt'),t=a.value.replace(/Artificial Intelligence/g,"Smart tech").replace(/significant/g,"great");
  a.value="";let i=0;function tp(){if(i<t.length){a.value+=t.charAt(i);i++;setTimeout(tp,20)}}tp();
 }
 function cpy(){let a=document.getElementById('txt');a.select();document.execCommand('copy');alert("Copied!");}
 function gen(){
  let p=document.getElementById('pr').value,r=document.getElementById('res'),s=document.getElementById('st');
  if(!p)return;s.innerText="Loading...";r.style.display="none";
  r.src=`https://pollinations.ai/p/${encodeURIComponent(p+" realistic,8k")}?width=1080&height=1080&model=flux&seed=${Math.random()}`;
  r.onload=()=>{r.style.display="block";s.innerText="Ready.";};
 }
</script>
</body>
</html>
