<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <meta name="google-site-verification" content="SqF7cBYyZQNeIYpfoKIpTSbBo0KKPW8pLbbTrjrY7fY" /> <title>AI Humanizer - Elite Strategic Tool</title> <style> :root { --primary: #00ff41; --bg: #050505; } body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; } .container { background: #111; padding: 30px; border-radius: 12px; border: 1px solid var(--primary); box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); width: 90%; max-width: 800px; text-align: center; } h1 { color: var(--primary); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 25px; } textarea { width: 100%; height: 200px; background: #1a1a1a; border: 1px solid #333; color: #eee; padding: 15px; border-radius: 8px; font-size: 16px; resize: none; margin-bottom: 20px; box-sizing: border-box; } textarea:focus { outline: none; border-color: var(--primary); } .btn { background: var(--primary); color: black; border: none; padding: 12px 30px; font-size: 18px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s; text-transform: uppercase; } .btn:hover { background: #00cc33; transform: scale(1.05); } .output-box { margin-top: 30px; text-align: left; background: #1a1a1a; padding: 20px; border-radius: 8px; border-left: 4px solid var(--primary); min-height: 100px; } .output-header { color: var(--primary); font-weight: bold; margin-bottom: 10px; display: block; } </style> </head> <body> <div class="container"> <h1>AI Humanizer</h1> <textarea id="inputText" placeholder="Paste your AI-generated text here..."></textarea> <button class="btn" onclick="humanizeText()">Humanize Text</button> <div class="output-box"> <span class="output-header">Humanized Output:</span> <div id="outputText">Result will appear here...</div> </div> </div> <script> function humanizeText() { const input = document.getElementById('inputText').value; const output = document.getElementById('outputText'); if(!input) { alert('Please enter text'); return; } output.innerHTML = "Processing neural optimization..."; setTimeout(() => { let text = input.replace(/\b(Furthermore|Moreover|In conclusion|Additionally|Consequently)\b/gi, 'Also'); text = text.replace(/\b(utilize|commence|terminate)\b/gi, (match) => { const map = {'utilize': 'use', 'commence': 'start', 'terminate': 'end'}; return map[match.toLowerCase()] || match; }); output.innerText = text; }, 800); } </script> </body> </html>
